name: Daily Job Scan

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours automatically
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests openpyxl

      - name: Run internship scanner (MN + Remote)
        run: python scan_jobs.py

      - name: Check job liveness (remove closed listings)
        run: python check_liveness.py

      - name: Push jobs.json to gh-pages
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages-deploy gh-pages
          cp jobs.json /tmp/gh-pages-deploy/jobs.json
          cd /tmp/gh-pages-deploy
          git add jobs.json
          git diff --staged --quiet \
            && echo "No changes to jobs.json" \
            || (git commit -m "scan: refresh jobs $(date -u +'%Y-%m-%d %H:%M UTC')" \
                && git push origin gh-pages)
