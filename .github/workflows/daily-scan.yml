name: Daily Job Scan

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install js-yaml

      - name: Initialize data files
        run: |
          mkdir -p data
          [ -f data/pipeline.md ] || printf '# Pipeline\n\n## Pendientes\n\n## Procesadas\n' > data/pipeline.md
          [ -f data/applications.md ] || printf '# Applications Tracker\n\n| # | Date | Company | Role | Score | Status | PDF | Report | Notes |\n|---|------|---------|------|-------|--------|-----|--------|-------|\n' > data/applications.md
          [ -f data/scan-history.tsv ] || printf 'date\turl\tcompany\trole\tlocation\tsource\tstatus\n' > data/scan-history.tsv

      - name: Run job scanner
        run: node scan.mjs

      - name: Generate jobs.json
        run: node gen-jobs-json.mjs

      - name: Push jobs.json to gh-pages
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages-deploy gh-pages
          cp jobs.json /tmp/gh-pages-deploy/jobs.json
          cd /tmp/gh-pages-deploy
          git add jobs.json
          git diff --staged --quiet && echo "No new jobs found" || (git commit -m "scan: update jobs $(date -u +%Y-%m-%d)" && git push origin gh-pages)
